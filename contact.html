<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Ethnic Royale</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@400;500;600&display=swap");
    :root {
      --gold: #d4a54a;
      --panel: rgba(12, 9, 4, 0.86);
      --border: rgba(212, 165, 74, 0.32);
      --text: #f0e7d0;
      --muted: #cbbd9c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Montserrat", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(212, 165, 74, 0.1), transparent 40%), #060402;
      padding: 20px;
    }
    .card {
      width: min(860px, 96vw);
      margin: 0 auto;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 16px;
      padding: 20px;
      display: grid;
      gap: 14px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    h1 { font-family: "Cinzel", serif; color: #f2dfb4; }
    .row {
      border: 1px solid rgba(212, 165, 74, 0.22);
      border-radius: 12px;
      padding: 12px;
      color: var(--muted);
      background: rgba(10, 7, 3, 0.6);
    }
    .btn {
      border: 1px solid var(--border);
      background: rgba(10, 7, 3, 0.7);
      color: #f0dfb4;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <h1>Contact</h1>
      <a class="btn" href="ndex.html">Back to Home</a>
    </div>
    <div class="row"><strong>Phone:</strong> +91 9149074092</div>
    <div class="row"><strong>Email:</strong> support@ethnicroyale.com</div>
    <div class="row"><strong>Address:</strong> New Delhi, India</div>
    <div class="row"><strong>Support Hours:</strong> Mon - Sat, 10:00 AM - 8:00 PM</div>
  </main>

  <script src="auth-utils.js"></script>
  <script>
    Auth.requireAuthOrRedirect("login.html");
  </script>
</body>
</html>
